spring.application.name=speaknow

# Database (uses environment variables, fallback to localhost for local dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/speaknow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Port (dynamic for cloud, defaults to 8080 for local)
server.port=${PORT:8080}

# Groq API Key
groq.api.key=${GROQ_API_KEY:}
