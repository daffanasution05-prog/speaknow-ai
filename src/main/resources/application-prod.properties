# Profile for zero-config free cloud deployment using in-memory H2 database
# Activate with: --spring.profiles.active=prod  OR  -Dspring.profiles.active=prod

# H2 In-Memory Database (MySQL-compatible mode)
spring.datasource.url=jdbc:h2:mem:speaknow_db;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Setup
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (optional, for debugging on prod)
spring.h2.console.enabled=false

# Groq API Key
groq.api.key=${GROQ_API_KEY:}
